<svg xmlns="http://www.w3.org/2000/svg" width="940" height="640" viewBox="0 0 940 640" font-family="Segoe UI, Arial, sans-serif">
  <rect x="0" y="0" width="940" height="640" fill="#ffffff"/>
  <text x="470" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#1f2937">DataCo 星型模型 (Star Schema)</text>
  <text x="470" y="56" text-anchor="middle" font-size="13" fill="#6b7280">库 dataco ｜ 粒度 = 订单行 order item ｜ 1 事实表 + 3 维表</text>

  <!-- ===== 连接线（先画线，表盖在上面）===== -->
  <!-- dim_date(底) -> fact(顶) -->
  <line x1="470" y1="205" x2="470" y2="250" stroke="#94a3b8" stroke-width="2"/>
  <text x="458" y="222" font-size="12" fill="#475569">1</text>
  <text x="452" y="247" font-size="14" fill="#475569">&#8734;</text>
  <!-- dim_customer(右) -> fact(左) -->
  <line x1="270" y1="360" x2="345" y2="380" stroke="#94a3b8" stroke-width="2"/>
  <text x="278" y="356" font-size="12" fill="#475569">1</text>
  <text x="330" y="378" font-size="14" fill="#475569">&#8734;</text>
  <!-- dim_product(左) -> fact(右) -->
  <line x1="670" y1="360" x2="595" y2="380" stroke="#94a3b8" stroke-width="2"/>
  <text x="656" y="356" font-size="12" fill="#475569">1</text>
  <text x="600" y="378" font-size="14" fill="#475569">&#8734;</text>

  <!-- ===== dim_date (顶) ===== -->
  <g>
    <rect x="370" y="80" width="200" height="128" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="370" y="80" width="200" height="28" rx="8" fill="#3b82f6"/>
    <rect x="370" y="94" width="200" height="14" fill="#3b82f6"/>
    <text x="470" y="99" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">dim_date</text>
    <text x="382" y="126" font-size="12.5" fill="#1e3a8a" font-weight="700">date_key</text>
    <rect x="500" y="116" width="26" height="14" rx="3" fill="#dbeafe"/>
    <text x="513" y="126" text-anchor="middle" font-size="10" fill="#1e40af" font-weight="700">PK</text>
    <text x="382" y="146" font-size="12" fill="#374151">year, quarter, month</text>
    <text x="382" y="164" font-size="12" fill="#374151">month_name</text>
    <text x="382" y="182" font-size="12" fill="#374151">day, weekday</text>
    <text x="382" y="200" font-size="11" fill="#9ca3af">1127 行</text>
  </g>

  <!-- ===== dim_customer (左) ===== -->
  <g>
    <rect x="70" y="300" width="200" height="120" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="70" y="300" width="200" height="28" rx="8" fill="#3b82f6"/>
    <rect x="70" y="314" width="200" height="14" fill="#3b82f6"/>
    <text x="170" y="319" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">dim_customer</text>
    <text x="82" y="346" font-size="12.5" fill="#1e3a8a" font-weight="700">customer_id</text>
    <rect x="200" y="336" width="26" height="14" rx="3" fill="#dbeafe"/>
    <text x="213" y="346" text-anchor="middle" font-size="10" fill="#1e40af" font-weight="700">PK</text>
    <text x="82" y="368" font-size="12" fill="#374151">customer_segment</text>
    <text x="82" y="404" font-size="11" fill="#9ca3af">20652 行（谁买的）</text>
  </g>

  <!-- ===== dim_product (右) ===== -->
  <g>
    <rect x="670" y="290" width="215" height="150" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="670" y="290" width="215" height="28" rx="8" fill="#3b82f6"/>
    <rect x="670" y="304" width="215" height="14" fill="#3b82f6"/>
    <text x="777" y="309" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">dim_product</text>
    <text x="682" y="336" font-size="12.5" fill="#1e3a8a" font-weight="700">product_card_id</text>
    <rect x="820" y="326" width="26" height="14" rx="3" fill="#dbeafe"/>
    <text x="833" y="336" text-anchor="middle" font-size="10" fill="#1e40af" font-weight="700">PK</text>
    <text x="682" y="356" font-size="12" fill="#374151">product_name</text>
    <text x="682" y="374" font-size="12" fill="#374151">category_id / name</text>
    <text x="682" y="392" font-size="12" fill="#374151">department_id / name</text>
    <text x="682" y="410" font-size="12" fill="#374151">product_price</text>
    <text x="682" y="430" font-size="11" fill="#9ca3af">118 行（买了啥）</text>
  </g>

  <!-- ===== fact_order_item (中心) ===== -->
  <g>
    <rect x="345" y="250" width="250" height="240" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
    <rect x="345" y="250" width="250" height="30" rx="8" fill="#f59e0b"/>
    <rect x="345" y="265" width="250" height="15" fill="#f59e0b"/>
    <text x="470" y="271" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">fact_order_item</text>
    <text x="358" y="300" font-size="12.5" fill="#92400e" font-weight="700">order_item_id</text>
    <rect x="524" y="290" width="26" height="14" rx="3" fill="#fde68a"/>
    <text x="537" y="300" text-anchor="middle" font-size="10" fill="#92400e" font-weight="700">PK</text>
    <text x="358" y="320" font-size="12" fill="#374151">order_id <tspan fill="#9ca3af">(退化维)</tspan></text>
    <text x="358" y="340" font-size="12" fill="#374151">customer_id</text>
    <rect x="524" y="330" width="26" height="14" rx="3" fill="#fee2e2"/>
    <text x="537" y="340" text-anchor="middle" font-size="10" fill="#b91c1c" font-weight="700">FK</text>
    <text x="358" y="360" font-size="12" fill="#374151">product_card_id</text>
    <rect x="524" y="350" width="26" height="14" rx="3" fill="#fee2e2"/>
    <text x="537" y="360" text-anchor="middle" font-size="10" fill="#b91c1c" font-weight="700">FK</text>
    <text x="358" y="380" font-size="12" fill="#374151">order_date_key</text>
    <rect x="524" y="370" width="26" height="14" rx="3" fill="#fee2e2"/>
    <text x="537" y="380" text-anchor="middle" font-size="10" fill="#b91c1c" font-weight="700">FK</text>
    <line x1="358" y1="392" x2="582" y2="392" stroke="#e5e7eb" stroke-width="1"/>
    <text x="358" y="410" font-size="11.5" fill="#059669" font-weight="700">度量值(可加)</text>
    <text x="358" y="426" font-size="11.5" fill="#374151">sales · profit · quantity</text>
    <text x="358" y="442" font-size="11.5" fill="#374151">discount · total</text>
    <text x="358" y="462" font-size="11.5" fill="#0369a1" font-weight="700">履约/订单属性</text>
    <text x="358" y="478" font-size="11.5" fill="#374151">late_risk · days · status</text>
  </g>

  <!-- 图例 -->
  <text x="470" y="530" text-anchor="middle" font-size="12" fill="#6b7280">关系：每张维表(1) —— 事实表(&#8734;)｜维表存"描述属性"，事实表存"数字+外键"</text>
  <text x="470" y="552" text-anchor="middle" font-size="12" fill="#6b7280">拆表理由：① 消冗余  ② 口径一致(改1处 vs 改18万行)  ③ Power BI 星型最优</text>
</svg>
